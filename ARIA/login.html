<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIA - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo-container" style="display: flex; align-items: center; gap: 10px;">
                <img src="images/Aria-logo.png" alt="Aria Logo" style="width: 30px; height: auto;">
                <span class="logo">ARIA</span>
        </nav>
    </header>

    <main>
        <section class="glass-card" style="max-width:400px; margin-top:100px;">
            <h2 style="text-align: center;">Login</h2>
            <form onsubmit="event.preventDefault(); 
                        const email = document.getElementById('e').value;
                        localStorage.setItem('user_id', email); 
                        location.href='home.html'">
                <input id="e" type="email" placeholder="Email" required>
                <input id="p" type="password" placeholder="Password" required>
                <button type="submit">Sign In</button>
            </form>
            <p style="text-align:center; margin-top:15px;">Need an account? <a href="signup.html" style="color:white">Register here</a></p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 ARIA Music Streamer. All rights reserved.</p>
    </footer>
</body>
</html>
