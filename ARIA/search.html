<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIA - Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo-container" style="display: flex; align-items: center; gap: 10px;">
            <img src="images/Aria-logo.png" alt="Aria Logo" style="width: 30px; height: auto;">
            <span class="logo">ARIA</span>
        </div>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="about.html">About</a>
            <a href="search.html">Search</a>
            <a href="playlist.html">Playlists</a>
            <a href="profile.html">Profile</a>
        </div>
    </nav>
    </header>

    <main class="container" style="padding:40px;">
        <section class="glass-card">
            <h2>Find Tracks</h2>
            <div style="display:flex; gap:10px">
                <input id="q" type="search" placeholder="Artist name...">
                <button onclick="aria.getSongs(document.getElementById('query').value)">Find</button>
            </div>
        </section>
        <div id="results" class="music-grid"></div>
    </main>
    
    <footer>

    <script src="api.js"></script>

</html>
